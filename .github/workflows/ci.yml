name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Generate golden fixtures
        run: bun run packages/sso-fixtures/scripts/generate.ts

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Biome
        run: bunx biome ci .

      - name: Test
        run: bun test --recursive packages/
